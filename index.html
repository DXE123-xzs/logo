<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业LOGO标志素材库</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", system-ui, sans-serif;
}

body {
    background-color: #f0f2f5;
    padding: 40px 20px;
}

.container {
    max-width: 1320px;
    margin: 0 auto;
}

.header-box {
    background: linear-gradient(135deg, #2563eb, #4080ff);
    color: #fff;
    padding: 32px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(37, 99, 235, 0.15);
    margin-bottom: 24px;
}
.header-box h1 {
    font-size: 28px;
    margin-bottom: 8px;
}
.header-box p {
    opacity: 0.9;
    font-size: 16px;
}

.tip-notice {
    background: #ffffff;
    padding: 18px 24px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    margin-bottom: 36px;
}
.tip-notice h3 {
    color: #1f2937;
    font-size: 17px;
    margin-bottom: 6px;
}
.tip-notice p {
    color: #6b7280;
}

.logo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 26px;
}

.logo-card {
    background: #ffffff;
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
    transition: all 0.28s ease;
    text-align: center;
}
.logo-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 28px rgba(37, 99, 235, 0.12);
}

.img-wrap {
    width: 100%;
    height: 150px;
    background: #f7f8fa;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
}
.img-wrap img {
    max-width: 85%;
    max-height: 85%;
    object-fit: contain;
}

.logo-name {
    font-size: 14px;
    color: #333;
    margin-bottom: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.download-btn {
    display: inline-block;
    padding: 8px 20px;
    background-color: #2563eb;
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    transition: background 0.24s ease;
}
.download-btn:hover {
    background-color: #1d4ed8;
}
</style>
</head>
<body>
<div class="container">
    <div class="header-box">
        <h1>企业LOGO标志素材库</h1>
        <p>全部标志可视化预览 · 一键下载原图</p>
    </div>

    <div class="tip-notice">
        <h3>素材更新说明</h3>
        <p>如需新增公司标志、矢量LOGO文件，请发送给管理员统一上传更新</p>
    </div>

    <div class="logo-grid" id="gallery"></div>
</div>

<script>
const OWNER = "DXE123-xzs";
const REPO = "logo";
const BRANCH = "main";

async function refreshLogoList() {
    const galleryBox = document.getElementById("gallery");
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/images?ref=${BRANCH}`);
    const fileList = await res.json();
    galleryBox.innerHTML = "";

    if (!Array.isArray(fileList)) return;

    fileList.forEach(file => {
        if (!file.name.match(/\.(png|jpg|jpeg|svg|ico)$/i)) return;
        const imgSrc = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/images/${file.name}`;

        const card = document.createElement("div");
        card.className = "logo-card";
        card.innerHTML = `
            <div class="img-wrap">
                <img src="${imgSrc}" alt="${file.name}" crossorigin="anonymous">
            </div>
            <div class="logo-name" title="${file.name}">${file.name}</div>
            <a class="download-btn" href="${imgSrc}" download="${file.name}">下载原图</a>
        `;
        galleryBox.appendChild(card);
    })
}

refreshLogoList();
</script>
</body>
</html>
