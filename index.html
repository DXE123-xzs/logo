<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业标志素材库 | 登录</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", system-ui, -apple-system, sans-serif;
}

/* 登录分栏页面（最高层级，永久盖住页面，强制拦截访问） */
.login-page {
    width: 100vw;
    height: 100vh;
    display: flex;
    position: fixed;
    inset: 0;
    z-index: 999999;
    pointer-events: all;
    background:#000;
}
.login-left {
    width: 55%;
    position: relative;
    overflow: hidden;
}
/* 左侧全屏视频 */
.left-bg-video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
}
.login-left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,10,30,0.55);
    z-index: 2;
}
.left-text-wrap {
    position: absolute;
    z-index: 3;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    color: #fff;
}
.left-text-wrap h1 {
    font-size: 48px;
    color: #00f0ff;
    text-shadow: 0 0 20px #00e5ff70;
    letter-spacing: 4px;
    margin-bottom: 20px;
}
.left-text-wrap p {
    font-size: 18px;
    color: #b8e6ff;
    line-height: 1.8;
    max-width: 480px;
}

.login-right {
    width: 45%;
    background: linear-gradient(145deg, #050a1a, #0a1430);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
}
.login-card {
    width: 100%;
    max-width: 420px;
    pointer-events: all;
}
.login-card-title {
    font-size: 32px;
    color: #fff;
    margin-bottom: 30px;
    text-align: center;
}
.tab-switch {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    border-bottom: 1px solid rgba(0,229,255,0.2);
}
.tab-switch button {
    flex: 1;
    padding: 12px 0;
    background: transparent;
    border: none;
    color: #94b8e0;
    font-size: 16px;
    cursor: pointer;
    position: relative;
}
.tab-switch button.active {
    color: #00f0ff;
}
.tab-switch button.active::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
}
.input-box {
    margin-bottom: 20px;
}
.input-box input {
    width: 100%;
    padding: 15px 18px;
    border-radius: 10px;
    border: 1px solid rgba(0,229,255,0.25);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
}
.input-box input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 12px rgba(0,229,255,0.2);
}
.input-box input::placeholder {
    color: #778fb8;
}
.submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}
.submit-btn:hover {
    box-shadow: 0 0 18px rgba(0,229,255,0.4);
}
.tips-desc {
    text-align: center;
    margin-top: 20px;
    color: #778fb8;
    font-size: 14px;
}
#registerForm {
    display: none;
}

/* 表单局部提示框样式（美化） */
.form-tip {
    width: 100%;
    padding: 10px 14px;
    margin-top: 12px;
    border-radius: 8px;
    background: rgba(20, 10, 30, 0.75);
    border: 1px solid rgba(255,80,120,0.4);
    color: #ff8899;
    font-size: 14px;
    text-align: center;
    opacity: 0;
    height: 0;
    overflow: hidden;
    transition: all 0.3s ease;
}
.form-tip.show {
    opacity: 1;
    height: auto;
}

/* 主素材页面 默认锁定，必须手动登录解锁 */
.main-site {
    min-height: 100vh;
    background: url('https://picsum.photos/id/1036/1920/1080') center/cover no-repeat fixed;
    position: relative;
    overflow-x: hidden;
    opacity: 0.15;
    pointer-events: none;
    transition: background 0.8s ease, opacity 0.6s ease;
}
/* 只有登录成功才激活页面 */
.main-site.unlock {
    opacity: 1;
    pointer-events: all;
}
.main-site::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #00e5ff, #9940ff);
    border-radius: 99px;
}

.container {
    max-width: 1500px;
    margin: 0 auto;
    padding: 50px 24px;
}

.header-box {
    background: linear-gradient(135deg, rgba(0,15,60,0.75), rgba(10,80,160,0.65));
    border: 1px solid rgba(0,229,255,0.3);
    box-shadow: 
        0 0 30px rgba(0,229,255,0.18),
        inset 0 0 40px rgba(0,229,255,0.08);
    color: #fff;
    padding: 48px 36px;
    border-radius: 24px;
    margin: 0 auto 40px;
    text-align: center;
    max-width: 860px;
    backdrop-filter: blur(12px);
    position:relative;
}
.header-box h1 {
    font-size: 38px;
    color: #00f0ff;
    text-shadow: 0 0 16px rgba(0,240,255,0.6);
    letter-spacing: 3px;
    margin-bottom: 12px;
    font-weight: 600;
}
.header-box p {
    color: #b8e6ff;
    font-size: 16px;
    opacity: 0.85;
    letter-spacing: 1px;
}

/* 全局右上角操作按钮组（脱离header，滚动固定） */
.top-btn-group {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 9999;
    display: flex;
    gap: 12px;
    /* 新增过渡隐藏样式，和天气面板统一 */
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
}
.top-btn-group.hide-panel {
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    pointer-events: none;
}
.logout-btn, .del-account-btn {
    padding:8px 16px;
    border-radius:8px;
    border:none;
    color:#fff;
    cursor:pointer;
    transition:0.2s;
}
.logout-btn {
    background:#ff4466;
}
.del-account-btn {
    background:#ff8822;
}
.logout-btn:hover, .del-account-btn:hover {
    opacity:0.85;
}

/* 注销弹窗遮罩 */
.del-modal {
    position: fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    z-index:99999;
    display:none;
    align-items:center;
    justify-content:center;
}
.del-modal.show {
    display:flex;
}
.del-box {
    width:360px;
    background:#0a1022;
    border:1px solid rgba(255,100,120,0.4);
    border-radius:16px;
    padding:28px;
}
.del-box h3 {
    color:#ff8899;
    text-align:center;
    margin-bottom:20px;
    font-size:20px;
}
.del-btn-wrap {
    display:flex;
    gap:10px;
    margin-top:16px;
}
.del-cancel, .del-confirm {
    flex:1;
    padding:12px;
    border-radius:8px;
    border:none;
    color:#fff;
    font-size:15px;
    cursor:pointer;
}
.del-cancel {
    background:#333;
}
.del-confirm {
    background:#ff4466;
}

.search-wrap {
    max-width: 660px;
    margin: 0 auto 48px;
}
#searchInput {
    width: 100%;
    padding: 18px 28px;
    font-size: 18px;
    border-radius: 999px;
    border: 1px solid rgba(0,229,255,0.25);
    background: rgba(255,255,255,0.05);
    color: #ffffff;
    outline: none;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}
#searchInput::placeholder {
    color: #94b8e0;
}
#searchInput:focus {
    box-shadow: 0 0 24px rgba(0,229,255,0.35);
    border-color: #00e5ff;
    background: rgba(255,255,255,0.08);
    transform: translateY(-2px);
}

/* 左上角天气面板 */
.time-weather-panel {
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 999;
    background: linear-gradient(135deg, rgba(0,15,60,0.28), rgba(10,80,160,0.22));
    border: 1px solid rgba(0,229,255,0.15);
    box-shadow: 0 0 10px rgba(0,229,255,0.08);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    padding: 16px 24px;
    color: #fff;
    min-width: 200px;
    font-size: 15px;
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
}
.time-weather-panel.hide-panel {
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    pointer-events: none;
}
.time-text {
    font-size: 28px;
    color: #00f0ff;
    text-shadow: 0 0 4px rgba(0,240,255,0.35);
    font-weight: 600;
    line-height: 1.1;
}
.date-text {
    font-size: 14px;
    color: #b8e6ff;
    margin: 6px 0 8px;
}
.weather-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #d0eaff;
}
.weather-icon {
    font-size: 24px;
}

/* 音乐播放器 */
.music-box {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,229,255,0.2);
}
.music-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
}
.play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
}
.play-progress {
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    position: relative;
}
.progress-inner {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
    width: 0%;
}
.volume-slider {
    width: 60px;
    height: 4px;
}
.music-time {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #b8e6ff;
    margin-top: 4px;
}

/* 移动端适配 */
@media screen and (max-width: 900px) {
    .login-page {
        flex-direction: column;
    }
    .login-left, .login-right {
        width: 100%;
        height: 50vh;
    }
    .left-text-wrap {
        left: 30px;
        right: 30px;
    }
    .left-text-wrap h1 {
        font-size: 32px;
    }
    .top-btn-group {
        flex-direction:column;
        gap:8px;
    }
}
@media screen and (max-width: 768px) {
    .time-weather-panel {
        top: 6px;
        left: 6px;
        padding: 12px 18px;
        min-width: 160px;
    }
    .time-text {
        font-size: 24px;
    }
    .date-text, .weather-row {
        font-size: 13px;
    }
    .weather-icon {
        font-size: 20px;
    }
    .play-btn {
        width: 24px;
        height: 24px;
        font-size: 12px;
    }
    .volume-slider {
        width: 45px;
    }
}

/* 滚动容器 */
.scroll-row {
    width: 100%;
    overflow: hidden;
    position: relative;
    margin: 32px 0;
    padding: 14px 0;
    cursor: grab;
    mask-image: linear-gradient(to right, transparent, #000 12%, #000 88%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, #000 12%, #000 88%, transparent);
}
.scroll-row:active {
    cursor: grabbing;
}
.scroll-row-inner {
    display: flex;
    gap: 42px;
    white-space: nowrap;
    transition: transform 0.12s ease-out;
}
.scroll-row:hover .scroll-row-inner {
    animation-play-state: paused !important;
}
.scroll-row.paused .scroll-row-inner {
    animation-play-state: paused !important;
}

.row-left .scroll-row-inner {
    animation: scrollLeft 32s linear infinite;
}
@keyframes scrollLeft {
    from {transform: translateX(var(--drag, 0px));}
    to {transform: translateX(calc(-50% + var(--drag, 0px)));}
}

.row-right .scroll-row-inner {
    animation: scrollRight 32s linear infinite;
}
@keyframes scrollRight {
    from {transform: translateX(calc(-50% + var(--drag, 0px)));}
    to {transform: translateX(var(--drag, 0px));}
}

.logo-card {
    width: 124px;
    height: 124px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    padding: 14px;
    text-align: center;
    transition: all 0.35s cubic-bezier(0.2,0,0.2,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid transparent;
    background-clip: padding-box;
}
.logo-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    padding: 1px;
    background: linear-gradient(135deg, #00e5ff, #a840ff, #00e5ff);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.4;
    transition: opacity 0.3s ease;
}
.logo-card:hover {
    background: rgba(0,229,255,0.1);
    transform: scale(1.08);
    box-shadow: 
        0 0 30px rgba(0,229,255,0.4),
        0 0 60px rgba(160,60,255,0.25);
}
.logo-card:hover::before {
    opacity: 1;
}
.logo-card img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
}
.logo-name {
    font-size: 12px;
    color: #c0e8ff;
    margin: 6px 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 96px;
    pointer-events: none;
}
.download-btn {
    font-size: 11px;
    padding: 4px 12px;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
    color: #fff;
    border-radius: 99px;
    position: relative;
    z-index: 2;
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 500;
}
.download-btn:hover {
    box-shadow: 0 0 12px rgba(0,229,255,0.6);
    transform: scale(1.05);
}

.preview-mask {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(8px);
}
.preview-img {
    max-width: 82%;
    max-height: 82%;
    border: 3px solid #ffffff;
    border-radius: 12px;
    background: transparent;
}

.empty-tip {
    color: #a0c8ff;
    text-align: center;
    font-size: 22px;
    padding: 100px 0;
    letter-spacing: 1px;
    opacity: 0.75;
}
</style>
</head>
<body>
<!-- 全屏强制登录遮罩，永远置顶 -->
<div class="login-page" id="loginPage">
    <div class="login-left">
        <!-- 视频容器，JS自动随机赋值src -->
        <video class="left-bg-video" autoplay muted loop playsinline id="bgVideo">
        </video>
        <div class="left-text-wrap">
            <h1>企业标志素材库</h1>
            <p>海量矢量标志素材，一键预览下载<br>统一素材管理，高效协作办公</p>
        </div>
    </div>
    <div class="login-right">
        <div class="login-card">
            <h2 class="login-card-title">账号登录</h2>
            <div class="tab-switch">
                <button class="tab-btn active" id="loginTab">登录</button>
                <button class="tab-btn" id="regTab">注册账号</button>
            </div>
            <!-- 登录表单 -->
            <div id="loginForm">
                <div class="input-box">
                    <input type="text" id="loginUser" placeholder="输入你的账号">
                </div>
                <div class="input-box">
                    <input type="password" id="loginPwd" placeholder="输入登录密码">
                </div>
                <button class="submit-btn" id="loginBtn">登录进入素材库</button>
                <!-- 登录局部提示框 -->
                <div class="form-tip" id="loginTip"></div>
            </div>
            <!-- 注册表单 -->
            <div id="registerForm">
                <div class="input-box">
                    <input type="text" id="regUser" placeholder="自定义账号名称">
                </div>
                <div class="input-box">
                    <input type="password" id="regPwd" placeholder="设置登录密码">
                </div>
                <div class="input-box">
                    <input type="password" id="regPwd2" placeholder="再次输入密码确认">
                </div>
                <button class="submit-btn" id="regBtn">完成注册</button>
                <!-- 注册局部提示框 -->
                <div class="form-tip" id="regTip"></div>
                <div class="tips-desc">注册后即可登录查看全部素材</div>
            </div>
        </div>
    </div>
</div>

<!-- 素材主页面 -->
<div class="main-site" id="mainSite">
    <!-- 全局右上角按钮组（固定悬浮，滚动同步隐藏） -->
    <div class="top-btn-group" id="topBtnWrap">
        <button class="logout-btn" id="logoutBtn">退出登录</button>
        <button class="del-account-btn" id="openDelModal">注销账号</button>
    </div>

    <!-- 账号注销弹窗 -->
    <div class="del-modal" id="delModal">
        <div class="del-box">
            <h3>永久注销账号</h3>
            <div class="input-box">
                <input type="text" id="delName" placeholder="输入要注销的账号">
            </div>
            <div class="input-box">
                <input type="password" id="delPwd" placeholder="输入该账号密码">
            </div>
            <div class="form-tip" id="delTip"></div>
            <div class="del-btn-wrap">
                <button class="del-cancel" id="closeDelModal">取消</button>
                <button class="del-confirm" id="confirmDel">确认注销</button>
            </div>
        </div>
    </div>

    <div class="header-box">
        <h1>企业标志素材库</h1>
        <p>海量企业LOGO矢量图标素材 · 一键预览下载</p>
    </div>

    <!-- 左上角天气+音乐面板 -->
    <div class="time-weather-panel" id="weatherPanel">
        <div class="time-text" id="timeBox">00:00</div>
        <div class="date-text" id="dateBox">2026年07月01日 星期三</div>
        <div class="weather-row">
            <span class="weather-icon" id="weatherIcon">🌤️</span>
            <span id="weatherText">加载天气...</span>
        </div>
        <div class="music-box">
            <div class="music-top">
                <button class="play-btn" id="playBtn">▶</button>
                <div class="play-progress" id="progressWrap">
                    <div class="progress-inner" id="progressBar"></div>
                </div>
                <input type="range" class="volume-slider" id="volumeCtrl" min="0" max="1" step="0.05" value="0.5">
            </div>
            <div class="music-time">
                <span id="currentTime">00:00</span>
                <span id="totalTime">00:00</span>
            </div>
        </div>
        <!-- 原音乐链接不变 -->
        <audio id="audioPlayer" loop volume="0.5">
            <source src="https://cdn.jsdelivr.net/gh/DXE123-xzs/logo@main/出现又离开.mp3" type="audio/mpeg">
        
    </div>

    <div class="search-wrap">
        <input id="searchInput" placeholder="输入品牌/标志名称快速检索素材..." type="text">
    </div>
    <div id="scrollBox"></div>

    <div class="preview-mask" id="mask">
        <img class="preview-img" id="bigImg">
    </div>
</div>

<script>
const OWNER = "DXE123-xzs";
const REPO = "logo";
const BRANCH = "main";

// 随机视频逻辑（3个视频存放在仓库video文件夹）
const videoList = [
    `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/video/1.mp4`,
    `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/video/2.mp4`,
    `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/video/3.mp4`
];
const bgVideo = document.getElementById('bgVideo');
// 随机取一个
const randomVideo = videoList[Math.floor(Math.random() * videoList.length)];
bgVideo.innerHTML = `<source src="${randomVideo}" type="video/mp4">`;
bgVideo.load();

// 页面DOM
const loginPage = document.getElementById('loginPage');
const mainSite = document.getElementById('mainSite');

// 账号本地存储工具
function getStaffAccounts() {
    const data = localStorage.getItem('staffAccountList');
    return data ? JSON.parse(data) : [];
}
function saveStaffAccounts(list) {
    localStorage.setItem('staffAccountList', JSON.stringify(list));
}

// 统一展示表单提示（替换alert，3秒自动消失）
function showTip(el, text) {
    el.textContent = text;
    el.classList.add('show');
    setTimeout(() => {
        el.classList.remove('show');
    }, 3000);
}
// 清除全部提示
function clearAllTip() {
    loginTip.classList.remove('show');
    regTip.classList.remove('show');
    delTip.classList.remove('show');
}

// 切换登录/注册表单
loginTab.onclick = () => {
    clearAllTip();
    loginTab.classList.add('active');
    regTab.classList.remove('active');
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
}
regTab.onclick = () => {
    clearAllTip();
    regTab.classList.add('active');
    loginTab.classList.remove('active');
    registerForm.style.display = 'block';
    loginForm.style.display = 'none';
}

// 注册逻辑（全部替换alert为局部提示）
regBtn.onclick = () => {
    clearAllTip();
    const u = regUser.value.trim();
    const p = regPwd.value.trim();
    const p2 = regPwd2.value.trim();
    if(!u || !p) return showTip(regTip, '账号和密码不能为空！');
    if(p !== p2) return showTip(regTip, '两次输入的密码不一致！');
    const accountList = getStaffAccounts();
    if(accountList.find(item => item.username === u)) return showTip(regTip, '该账号已注册，请直接登录');
    accountList.push({username: u, password: p});
    saveStaffAccounts(accountList);
    showTip(regTip, '注册成功！请切换到登录页面登录');
    setTimeout(()=>{
        loginTab.click();
        regUser.value = regPwd.value = regPwd2.value = '';
    },1500);
}

// 登录成功函数
function enterMainPage() {
    loginPage.style.display = 'none';
    mainSite.classList.add('unlock');
    refreshLogoList();
}
loginBtn.onclick = () => {
    clearAllTip();
    const u = loginUser.value.trim();
    const p = loginPwd.value.trim();
    if(!u || !p) return showTip(loginTip, '账号和密码不能为空！');
    const list = getStaffAccounts();
    const match = list.find(item => item.username === u && item.password === p);
    if(match) {
        enterMainPage();
    } else {
        showTip(loginTip, '账号或密码错误，请核对后重试');
    }
}

// 退出登录，清除缓存，强制回到登录页
logoutBtn.onclick = () => {
    loginPage.style.display = 'flex';
    mainSite.classList.remove('unlock');
}

// 注销弹窗打开关闭
openDelModal.onclick = () => {
    clearAllTip();
    delModal.classList.add('show');
}
closeDelModal.onclick = () => {
    delModal.classList.remove('show');
    delName.value = '';
    delPwd.value = '';
}

// 账号注销核心逻辑
confirmDel.onclick = () => {
    clearAllTip();
    const delUser = delName.value.trim();
    const delPass = delPwd.value.trim();
    if(!delUser || !delPass) return showTip(delTip, '账号和密码不能为空！');
    let accountArr = getStaffAccounts();
    // 查找匹配账号密码
    const targetIndex = accountArr.findIndex(item => item.username === delUser && item.password === delPass);
    if(targetIndex === -1) return showTip(delTip, '账号或密码不匹配，无法注销');
    // 删除该账号
    accountArr.splice(targetIndex, 1);
    saveStaffAccounts(accountArr);
    showTip(delTip, '账号已永久注销，弹窗1.5秒关闭');
    setTimeout(()=>{
        delModal.classList.remove('show');
        delName.value = '';
        delPwd.value = '';
    },1500);
}

// 滚动监听 下滑同时隐藏天气面板 + 右上角退出注销按钮
let lastScrollY = 0;
window.addEventListener('scroll', () => {
    const currentY = window.scrollY;
    if (currentY > 80) {
        weatherPanel.classList.add('hide-panel');
        topBtnWrap.classList.add('hide-panel');
    } else {
        weatherPanel.classList.remove('hide-panel');
        topBtnWrap.classList.remove('hide-panel');
    }
    lastScrollY = currentY;
})

// 实时时间日期
function updateDateTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    const hours = String(now.getHours()).padStart(2, "0");
    const mins = String(now.getMinutes()).padStart(2, "0");
    const weekArr = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
    const week = weekArr[now.getDay()];
    timeBox.textContent = `${hours}:${mins}`;
    dateBox.textContent = `${year}年${month}月${day} ${week}`;
}
updateDateTime();
setInterval(updateDateTime, 1000);

// 天气图标映射
const weatherEmojiMap = {
    "晴":"☀️", "多云":"⛅", "阴":"☁️", "小雨":"🌧️", "中雨":"🌧️", "大雨":"🌧️",
    "雷阵雨":"⛈️", "小雪":"❄️", "大雪":"❄️", "雾":"🌫️", "霾":"🌫️"
};
function setDefaultWeather() {
    weatherIcon.textContent = "⛅";
    weatherText.textContent = "济南 多云";
}
async function getWeather() {
    setDefaultWeather();
    try {
        const res = await fetch("https://www.weatherapi.com/api-explorer.aspx/v1/current.json?key=demo&q=jinan&aqi=no");
        if (!res.ok) throw new Error();
        const data = await res.json();
        const wText = data.current.condition.text;
        const temp = data.current.temp_c;
        weatherIcon.textContent = weatherEmojiMap[wText] || "⛅";
        weatherText.textContent = `${wText} ${temp}℃`;
    } catch(err) {
        console.log('天气接口加载失败，使用默认天气');
    }
}
getWeather();
setInterval(getWeather, 3600000);

// 音乐播放器逻辑
function formatSec(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, "0");
    const s = Math.floor(sec % 60).toString().padStart(2, "0");
    return m + ":" + s;
}
playBtn.onclick = () => {
    if(audioPlayer.paused) {
        audioPlayer.play();
        playBtn.textContent = "⏸";
    } else {
        audioPlayer.pause();
        playBtn.textContent = "▶";
    }
}
volumeCtrl.oninput = () => audioPlayer.volume = volumeCtrl.value;
audioPlayer.addEventListener('loadedmetadata', () => totalTimeEl.textContent = formatSec(audioPlayer.duration));
audioPlayer.addEventListener('timeupdate', () => {
    const per = (audioPlayer.currentTime / audioPlayer.duration) * 100;
    progressBar.style.width = per + "%";
    currentTimeEl.textContent = formatSec(audioPlayer.currentTime);
});
progressWrap.onclick = (e) => {
    const rect = progressWrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const rate = x / rect.width;
    audioPlayer.currentTime = audioPlayer.duration * rate;
}

let allImageList = [];
async function downloadImage(url, fileName) {
    try {
        const res = await fetch(url);
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(blobUrl);
    } catch (e) {
        window.open(url, "_blank");
    }
}
async function refreshLogoList() {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/images?ref=${BRANCH}`);
    const fileList = await res.json();
    scrollBox.innerHTML = "";
    if (!Array.isArray(fileList)) return;
    allImageList = fileList.filter(file => /\.(png|jpg|jpeg|svg|ico)$/i.test(file.name));
    renderFilterList("");
}
function renderFilterList(keyword) {
    scrollBox.innerHTML = "";
    const isSearch = keyword.trim() !== "";
    const filterList = allImageList.filter(item => item.name.toLowerCase().includes(keyword.toLowerCase()));
    if (filterList.length === 0) {
        scrollBox.innerHTML = `<div class="empty-tip">未匹配到相关标志素材，请更换关键词搜索</div>`;
        return;
    }
    const rowSize = 8;
    const totalRow = Math.ceil(filterList.length / rowSize);
    for (let r = 0; r < totalRow; r++) {
        const rowData = filterList.slice(r * rowSize, (r + 1) * rowSize);
        const listDouble = [...rowData, ...rowData];
        const rowClass = r % 2 === 0 ? "scroll-row row-left" : "scroll-row row-right";
        const rowWrap = document.createElement("div");
        rowWrap.className = rowClass;
        rowWrap.style.setProperty("--drag", "0px");
        const inner = document.createElement("div");
        inner.className = "scroll-row-inner";
        if (isSearch) inner.style.animation = "none";
        listDouble.forEach(file => {
            const imgSrc = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/images/${file.name}`;
            const card = document.createElement("div");
            card.className = "logo-card";
            card.innerHTML = `
                <img src="${imgSrc}" crossorigin="anonymous">
                <div class="logo-name" title="${file.name}">${file.name}</div>
                <div class="download-btn">下载原图</div>
            `;
            let dragMoved = false;
            let startX = 0;
            let startY = 0;
            const dragThreshold = 5;
            card.onmousedown = (e) => {
                dragMoved = false;
                startX = e.clientX;
                startY = e.clientY;
            }
            card.onmousemove = (e) => {
                const dx = Math.abs(e.clientX - startX);
                const dy = Math.abs(e.clientY - startY);
                if (dx > dragThreshold || dy > dragThreshold) dragMoved = true;
            }
            card.onmouseup = () => {
                if (!dragMoved) {
                    bigImg.src = imgSrc;
                    mask.style.display = "flex";
                }
            }
            card.querySelector(".download-btn").onclick = (e) => {
                e.stopPropagation();
                downloadImage(imgSrc, file.name);
            }
            inner.appendChild(card);
        })
        rowWrap.appendChild(inner);
        scrollBox.appendChild(rowWrap);

        // 独立拖拽监听，多行不冲突
        let dragState = {
            isDrag: false,
            dragStartX: 0,
            dragOffset: 0
        };
        function onMove(e) {
            if (!dragState.isDrag) return;
            const diff = e.clientX - dragState.dragStartX;
            dragState.dragOffset += diff;
            dragState.dragStartX = e.clientX;
            rowWrap.style.setProperty("--drag", dragState.dragOffset + "px");
        }
        function onUp() {
            dragState.isDrag = false;
            rowWrap.classList.remove("paused");
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        }
        rowWrap.addEventListener('mousedown', (e) => {
            dragState.isDrag = true;
            dragState.dragStartX = e.clientX;
            rowWrap.classList.add("paused");
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
    }
}
searchInput.addEventListener("input", (e) => renderFilterList(e.target.value));
