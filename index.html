<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业标志素材库</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", system-ui, sans-serif;
}

body {
    min-height: 100vh;
    background: url('https://picsum.photos/id/1036/1920/1080') center/cover no-repeat fixed;
    position: relative;
    overflow-x: hidden;
    transition: background 0.6s ease;
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 8, 22, 0.82);
    z-index: -1;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 20px;
}

/* 顶部标题栏 */
.header-box {
    background: linear-gradient(135deg, rgba(0,10,50,0.8), rgba(0,70,130,0.7));
    border: 1px solid #00e5ff90;
    box-shadow: 0 0 20px #00e5ff40, inset 0 0 30px rgba(0,229,255,0.1);
    color: #fff;
    padding: 40px 32px;
    border-radius: 18px;
    margin: 0 auto 32px;
    text-align: center;
    max-width: 820px;
}
.header-box h1 {
    font-size: 34px;
    color: #00e5ff;
    text-shadow: 0 0 12px #00e5ff;
    letter-spacing: 2px;
}

/* 搜索框区域 */
.search-wrap {
    max-width: 620px;
    margin: 0 auto 42px;
}
#searchInput {
    width: 100%;
    padding: 16px 24px;
    font-size: 17px;
    border-radius: 999px;
    border: 1px solid #00e5ff70;
    background: rgba(255,255,255,0.07);
    color: #ffffff;
    outline: none;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
}
#searchInput::placeholder {
    color: #b0c8e8;
}
#searchInput:focus {
    box-shadow: 0 0 16px #00e5ff60;
    border-color: #00e5ff;
    background: rgba(255,255,255,0.1);
}

/* 滚动行通用样式 */
.scroll-row {
    width: 100%;
    overflow: hidden;
    position: relative;
    margin: 24px 0;
    padding: 10px 0;
}
.scroll-row-inner {
    display: flex;
    gap: 36px;
    white-space: nowrap;
}
/* 鼠标悬停整行暂停滚动 */
.scroll-row:hover .scroll-row-inner {
    animation-play-state: paused;
}

/* 奇数行：从右向左滚动 */
.row-left .scroll-row-inner {
    animation: moveLeft 32s linear infinite;
}
@keyframes moveLeft {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* 偶数行：从左向右滚动 */
.row-right .scroll-row-inner {
    animation: moveRight 32s linear infinite;
}
@keyframes moveRight {
    0% { transform: translateX(-50%); }
    100% { transform: translateX(0); }
}

/* LOGO圆形卡片样式 */
.logo-card {
    width: 110px;
    height: 110px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(6px);
    border: 1px solid #00e5ff60;
    border-radius: 50%;
    padding: 12px;
    text-align: center;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.logo-card:hover {
    transform: scale(1.12);
    background: rgba(0,229,255,0.14);
    box-shadow: 0 0 22px #00e5ff, 0 0 40px #d040ff50;
}
.logo-card img {
    width: 65px;
    height: 65px;
    object-fit: contain;
}
.logo-name {
    font-size: 11px;
    color: #b0e8ff;
    margin: 5px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 85px;
}
.download-btn {
    font-size: 10px;
    padding: 3px 10px;
    background: linear-gradient(90deg,#00e5ff,#d040ff);
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    transition: box-shadow 0.25s;
}
.download-btn:hover {
    box-shadow: 0 0 10px #00e5ff;
}

/* 无搜索结果提示 */
.empty-tip {
    color: #a0c8ff;
    text-align: center;
    font-size: 20px;
    padding: 80px 0;
}

/* 手机端自适应 */
@media screen and (max-width: 700px) {
    .scroll-row-inner {
        animation: none;
        flex-wrap: wrap;
        justify-content: center;
    }
    .logo-card {
        width: 95px;
        height: 95px;
    }
    .header-box h1 {
        font-size: 26px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="header-box">
        <h1>企业标志素材库</h1>
    </div>

    <!-- 搜索框 -->
    <div class="search-wrap">
        <input id="searchInput" placeholder="输入标志名称快速搜索..." type="text">
    </div>

    <!-- 滚动容器（多行交错） -->
    <div id="scrollBox"></div>
</div>

<script>
const OWNER = "DXE123-xzs";
const REPO = "logo";
const BRANCH = "main";
let allImageList = [];
const scrollBox = document.getElementById("scrollBox");
const searchInput = document.getElementById("searchInput");

// 自动循环背景配置，30秒切换一张
const bgList = [
    "https://picsum.photos/id/1036/1920/1080",
    "https://picsum.photos/id/1018/1920/1080",
    "https://picsum.photos/id/1043/1920/1080",
    "https://picsum.photos/id/1015/1920/1080"
];
let bgIndex = 0;
// 30000毫秒=30秒自动切换
setInterval(() => {
    bgIndex = (bgIndex + 1) % bgList.length;
    document.body.style.backgroundImage = `url(${bgList[bgIndex]})`;
}, 30000);

// 加载仓库全部图片
async function refreshLogoList() {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/images?ref=${BRANCH}`);
    const fileList = await res.json();
    scrollBox.innerHTML = "";

    if (!Array.isArray(fileList)) return;
    allImageList = fileList.filter(file => /\.(png|jpg|jpeg|svg|ico)$/i.test(file.name));
    renderFilterList("");
}

// 交错多行渲染：奇数行左移、偶数行右移
function renderFilterList(keyword) {
    scrollBox.innerHTML = "";
    const filterList = allImageList.filter(item => item.name.toLowerCase().includes(keyword.toLowerCase()));

    if (filterList.length === 0) {
        scrollBox.innerHTML = `<div class="empty-tip">未匹配到相关标志素材</div>`;
        return;
    }

    // 每行放8个标志，自动分行
    const rowSize = 8;
    const totalRow = Math.ceil(filterList.length / rowSize);
    for (let r = 0; r < totalRow; r++) {
        // 截取当前行图片
        const rowData = filterList.slice(r * rowSize, (r + 1) * rowSize);
        // 复制两份实现无缝滚动
        const show = [...rowData, ...rowData];
        // 奇偶行区分滚动方向
        const rowClass = r % 2 === 0 ? "scroll-row row-left" : "scroll-row row-right";

        // 创建行容器
        const rowWrap = document.createElement("div");
        rowWrap.className = rowClass;
        const inner = document.createElement("div");
        inner.className = "scroll-row-inner";

        show.forEach(file => {
            const imgSrc = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/images/${file.name}`;
            const card = document.createElement("div");
            card.className = "logo-card";
            card.innerHTML = `
                <img src="${imgSrc}" alt="${file.name}" crossorigin="anonymous">
                <div class="logo-name" title="${file.name}">${file.name}</div>
                <a class="download-btn" href="${imgSrc}" download="${file.name}">下载原图</a>
            `;
            inner.appendChild(card);
        })
        rowWrap.appendChild(inner);
        scrollBox.appendChild(rowWrap);
    }
}

// 搜索实时监听
searchInput.addEventListener("input", (e) => {
    renderFilterList(e.target.value);
});

// 初始化加载
refreshLogoList();
</script>
</body>
</html>
