<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业标志素材库</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", system-ui, sans-serif;
}

body {
    min-height: 100vh;
    background: url('https://picsum.photos/id/1036/1920/1080') center/cover no-repeat fixed;
    position: relative;
    overflow-x: hidden;
    transition: background 0.6s ease;
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 8, 22, 0.82);
    z-index: -1;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 20px;
}

.header-box {
    background: linear-gradient(135deg, rgba(0,10,50,0.8), rgba(0,70,130,0.7));
    border: 1px solid #00e5ff90;
    box-shadow: 0 0 20px #00e5ff40, inset 0 0 30px rgba(0,229,255,0.1);
    color: #fff;
    padding: 40px 32px;
    border-radius: 18px;
    margin: 0 auto 32px;
    text-align: center;
    max-width: 820px;
}
.header-box h1 {
    font-size: 34px;
    color: #00e5ff;
    text-shadow: 0 0 12px #00e5ff;
    letter-spacing: 2px;
}

.search-wrap {
    max-width: 620px;
    margin: 0 auto 42px;
}
#searchInput {
    width: 100%;
    padding: 16px 24px;
    font-size: 17px;
    border-radius: 999px;
    border: 1px solid #00e5ff70;
    background: rgba(255,255,255,0.07);
    color: #ffffff;
    outline: none;
    backdrop-filter: blur(8px);
}
#searchInput::placeholder {
    color: #b0c8e8;
}
#searchInput:focus {
    box-shadow: 0 0 16px #00e5ff60;
    border-color: #00e5ff;
}

.scroll-row {
    width: 100%;
    overflow: hidden;
    position: relative;
    margin: 24px 0;
    padding: 10px 0;
    cursor: grab;
}
.scroll-row:active {
    cursor: grabbing;
}
.scroll-row-inner {
    display: flex;
    gap: 36px;
    white-space: nowrap;
    transition: transform 0.1s ease-out;
}
.scroll-row:hover .scroll-row-inner {
    animation-play-state: paused !important;
}
.scroll-row.paused .scroll-row-inner {
    animation-play-state: paused !important;
}

.row-left .scroll-row-inner {
    animation: scrollLeft 25s linear infinite;
}
@keyframes scrollLeft {
    from {transform: translateX(var(--drag, 0px));}
    to {transform: translateX(calc(-50% + var(--drag, 0px)));}
}

.row-right .scroll-row-inner {
    animation: scrollRight 25s linear infinite;
}
@keyframes scrollRight {
    from {transform: translateX(calc(-50% + var(--drag, 0px)));}
    to {transform: translateX(var(--drag, 0px));}
}

.logo-card {
    width: 110px;
    height: 110px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(6px);
    border: 1px solid #00e5ff60;
    border-radius: 50%;
    padding: 12px;
    text-align: center;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.logo-card:hover {
    background: rgba(0,229,255,0.14);
    box-shadow: 0 0 22px #00e5ff, 0 0 40px #d040ff50;
    transform: none;
}
.logo-card img {
    width: 65px;
    height: 65px;
    object-fit: contain;
    pointer-events: none;
}
.logo-name {
    font-size: 11px;
    color: #b0e8ff;
    margin: 5px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 85px;
    pointer-events: none;
}
.download-btn {
    font-size: 10px;
    padding: 3px 10px;
    background: linear-gradient(90deg,#00e5ff,#d040ff);
    color: #fff;
    border-radius: 12px;
    position: relative;
    z-index: 2;
    cursor: pointer;
}

.preview-mask {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
.preview-img {
    max-width: 80%;
    max-height: 80%;
}

.empty-tip {
    color: #a0c8ff;
    text-align: center;
    font-size: 20px;
    padding: 80px 0;
}

@media screen and (max-width: 700px) {
    .scroll-row-inner {
        animation: none !important;
        flex-wrap: wrap;
        justify-content: center;
    }
    .logo-card {
        width: 95px;
        height: 95px;
    }
    .header-box h1 {
        font-size: 26px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="header-box">
        <h1>企业标志素材库</h1>
    </div>

    <div class="search-wrap">
        <input id="searchInput" placeholder="输入标志名称快速搜索..." type="text">
    </div>

    <div id="scrollBox"></div>
</div>

<div class="preview-mask" id="mask">
    <img class="preview-img" id="bigImg">
</div>

<script>
const OWNER = "DXE123-xzs";
const REPO = "logo";
const BRANCH = "main";

const mask = document.getElementById("mask");
const bigImg = document.getElementById("bigImg");
const scrollBox = document.getElementById("scrollBox");
const searchInput = document.getElementById("searchInput");

mask.onclick = () => mask.style.display = "none";

// 自动切换背景
const bgList = [
    "https://picsum.photos/id/1036/1920/1080",
    "https://picsum.photos/id/1018/1920/1080",
    "https://picsum.photos/id/1043/1920/1080",
    "https://picsum.photos/id/1015/1920/1080"
];
let bgIndex = 0;
setInterval(() => {
    bgIndex = (bgIndex + 1) % bgList.length;
    document.body.style.backgroundImage = `url(${bgList[bgIndex]})`;
}, 30000);

let allImageList = [];

// 二进制强制下载函数（解决跨域CDN无法下载问题）
async function downloadImage(url, fileName) {
    try {
        const res = await fetch(url);
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(blobUrl);
    } catch (e) {
        window.open(url, "_blank");
    }
}

// 读取GitHub仓库图片
async function refreshLogoList() {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/images?ref=${BRANCH}`);
    const fileList = await res.json();
    scrollBox.innerHTML = "";
    if (!Array.isArray(fileList)) return;
    allImageList = fileList.filter(file => /\.(png|jpg|jpeg|svg|ico)$/i.test(file.name));
    renderFilterList("");
}

function renderFilterList(keyword) {
    scrollBox.innerHTML = "";
    const isSearch = keyword.trim() !== "";
    const filterList = allImageList.filter(item => item.name.toLowerCase().includes(keyword.toLowerCase()));

    if (filterList.length === 0) {
        scrollBox.innerHTML = `<div class="empty-tip">未匹配到相关标志素材</div>`;
        return;
    }

    const rowSize = 8;
    const totalRow = Math.ceil(filterList.length / rowSize);
    for (let r = 0; r < totalRow; r++) {
        const rowData = filterList.slice(r * rowSize, (r + 1) * rowSize);
        const listDouble = [...rowData, ...rowData];
        const rowClass = r % 2 === 0 ? "scroll-row row-left" : "scroll-row row-right";

        const rowWrap = document.createElement("div");
        rowWrap.className = rowClass;
        rowWrap.style.setProperty("--drag", "0px");
        const inner = document.createElement("div");
        inner.className = "scroll-row-inner";

        if (isSearch) {
            inner.style.animation = "none";
        }

        listDouble.forEach(file => {
            const imgSrc = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/images/${file.name}`;
            const card = document.createElement("div");
            card.className = "logo-card";
            card.innerHTML = `
                <img src="${imgSrc}" crossorigin="anonymous">
                <div class="logo-name" title="${file.name}">${file.name}</div>
                <div class="download-btn">下载原图</div>
            `;

            let dragMoved = false;

            // 点击按钮执行强制下载，阻止冒泡，不会打开大图
            card.querySelector(".download-btn").onclick = function (e) {
                e.stopPropagation();
                downloadImage(imgSrc, file.name);
            }

            // 点击卡片预览大图
            card.onclick = function (e) {
                if (dragMoved) {
                    dragMoved = false;
                    return;
                }
                bigImg.src = imgSrc;
                mask.style.display = "flex";
            }

            inner.appendChild(card);
        })
        rowWrap.appendChild(inner);
        scrollBox.appendChild(rowWrap);

        // 鼠标拖拽整行滑动
        let isDrag = false;
        let startX = 0;
        let dragOffset = 0;

        rowWrap.addEventListener("mousedown", (e) => {
            isDrag = true;
            startX = e.clientX;
            rowWrap.classList.add("paused");
        });
        document.addEventListener("mousemove", (e) => {
            if (!isDrag) return;
            const diff = e.clientX - startX;
            if (Math.abs(diff) > 5) dragMoved = true;
            dragOffset += diff;
            startX = e.clientX;
            rowWrap.style.setProperty("--drag", dragOffset + "px");
        });
        document.addEventListener("mouseup", () => {
            isDrag = false;
            rowWrap.classList.remove("paused");
        });
    }
}

searchInput.addEventListener("input", (e) => {
    renderFilterList(e.target.value);
});

refreshLogoList();
</script>
</body>
</html>
