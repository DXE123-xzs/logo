<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业标志素材库 | LOGO资源中心</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", system-ui, -apple-system, sans-serif;
}

body {
    min-height: 100vh;
    background: url('https://picsum.photos/id/1036/1920/1080') center/cover no-repeat fixed;
    position: relative;
    overflow-x: hidden;
    transition: background 0.8s ease, opacity 0.6s ease;
    opacity: 0;
    animation: pageFadeIn 1s ease forwards;
}
@keyframes pageFadeIn {
    to { opacity: 1; }
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #00e5ff, #9940ff);
    border-radius: 99px;
}

.container {
    max-width: 1500px;
    margin: 0 auto;
    padding: 50px 24px;
}

.header-box {
    background: linear-gradient(135deg, rgba(0,15,60,0.75), rgba(10,80,160,0.65));
    border: 1px solid rgba(0,229,255,0.3);
    box-shadow: 
        0 0 30px rgba(0,229,255,0.18),
        inset 0 0 40px rgba(0,229,255,0.08);
    color: #fff;
    padding: 48px 36px;
    border-radius: 24px;
    margin: 0 auto 40px;
    text-align: center;
    max-width: 860px;
    backdrop-filter: blur(12px);
}
.header-box h1 {
    font-size: 38px;
    color: #00f0ff;
    text-shadow: 0 0 16px rgba(0,240,255,0.6);
    letter-spacing: 3px;
    margin-bottom: 12px;
    font-weight: 600;
}
.header-box p {
    color: #b8e6ff;
    font-size: 16px;
    opacity: 0.85;
    letter-spacing: 1px;
}

.search-wrap {
    max-width: 660px;
    margin: 0 auto 48px;
}
#searchInput {
    width: 100%;
    padding: 18px 28px;
    font-size: 18px;
    border-radius: 999px;
    border: 1px solid rgba(0,229,255,0.25);
    background: rgba(255,255,255,0.05);
    color: #ffffff;
    outline: none;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}
#searchInput::placeholder {
    color: #94b8e0;
}
#searchInput:focus {
    box-shadow: 0 0 24px rgba(0,229,255,0.35);
    border-color: #00e5ff;
    background: rgba(255,255,255,0.08);
    transform: translateY(-2px);
}

/* 左上角天气面板 再次放大 */
.time-weather-panel {
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 999;
    background: linear-gradient(135deg, rgba(0,15,60,0.28), rgba(10,80,160,0.22));
    border: 1px solid rgba(0,229,255,0.15);
    box-shadow: 0 0 10px rgba(0,229,255,0.08);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    padding: 16px 24px;
    color: #fff;
    min-width: 200px;
    font-size: 15px;
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
}
.time-weather-panel.hide-panel {
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    pointer-events: none;
}
.time-text {
    font-size: 28px;
    color: #00f0ff;
    text-shadow: 0 0 4px rgba(0,240,255,0.35);
    font-weight: 600;
    line-height: 1.1;
}
.date-text {
    font-size: 14px;
    color: #b8e6ff;
    margin: 6px 0 8px;
}
.weather-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #d0eaff;
}
.weather-icon {
    font-size: 24px;
}

/* 音乐播放器样式 */
.music-box {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,229,255,0.2);
}
.music-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
}
.play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
}
.play-progress {
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    position: relative;
}
.progress-inner {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
    width: 0%;
}
.volume-slider {
    width: 60px;
    height: 4px;
}
.music-time {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #b8e6ff;
    margin-top: 4px;
}

/* 移动端适配 */
@media screen and (max-width: 768px) {
    .time-weather-panel {
        top: 6px;
        left: 6px;
        padding: 12px 18px;
        min-width: 160px;
    }
    .time-text {
        font-size: 24px;
    }
    .date-text, .weather-row {
        font-size: 13px;
    }
    .weather-icon {
        font-size: 20px;
    }
    .play-btn {
        width: 24px;
        height: 24px;
        font-size: 12px;
    }
    .volume-slider {
        width: 45px;
    }
}

/* 滚动容器 */
.scroll-row {
    width: 100%;
    overflow: hidden;
    position: relative;
    margin: 32px 0;
    padding: 14px 0;
    cursor: grab;
    mask-image: linear-gradient(to right, transparent, #000 12%, #000 88%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, #000 12%, #000 88%, transparent);
}
.scroll-row:active {
    cursor: grabbing;
}
.scroll-row-inner {
    display: flex;
    gap: 42px;
    white-space: nowrap;
    transition: transform 0.12s ease-out;
}
.scroll-row:hover .scroll-row-inner {
    animation-play-state: paused !important;
}
.scroll-row.paused .scroll-row-inner {
    animation-play-state: paused !important;
}

.row-left .scroll-row-inner {
    animation: scrollLeft 32s linear infinite;
}
@keyframes scrollLeft {
    from {transform: translateX(var(--drag, 0px));}
    to {transform: translateX(calc(-50% + var(--drag, 0px)));}
}

.row-right .scroll-row-inner {
    animation: scrollRight 32s linear infinite;
}
@keyframes scrollRight {
    from {transform: translateX(calc(-50% + var(--drag, 0px)));}
    to {transform: translateX(var(--drag, 0px));}
}

.logo-card {
    width: 124px;
    height: 124px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    padding: 14px;
    text-align: center;
    transition: all 0.35s cubic-bezier(0.2,0,0.2,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid transparent;
    background-clip: padding-box;
}
.logo-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    padding: 1px;
    background: linear-gradient(135deg, #00e5ff, #a840ff, #00e5ff);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.4;
    transition: opacity 0.3s ease;
}
.logo-card:hover {
    background: rgba(0,229,255,0.1);
    transform: scale(1.08);
    box-shadow: 
        0 0 30px rgba(0,229,255,0.4),
        0 0 60px rgba(160,60,255,0.25);
}
.logo-card:hover::before {
    opacity: 1;
}
.logo-card img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
}
.logo-name {
    font-size: 12px;
    color: #c0e8ff;
    margin: 6px 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 96px;
    pointer-events: none;
}
.download-btn {
    font-size: 11px;
    padding: 4px 12px;
    background: linear-gradient(90deg,#00e5ff,#a840ff);
    color: #fff;
    border-radius: 99px;
    position: relative;
    z-index: 2;
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 500;
}
.download-btn:hover {
    box-shadow: 0 0 12px rgba(0,229,255,0.6);
    transform: scale(1.05);
}

.preview-mask {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(8px);
}
.preview-img {
    max-width: 82%;
    max-height: 82%;
    border: 3px solid #ffffff;
    border-radius: 12px;
    background: transparent;
}

.empty-tip {
    color: #a0c8ff;
    text-align: center;
    font-size: 22px;
    padding: 100px 0;
    letter-spacing: 1px;
    opacity: 0.75;
}

@media screen and (max-width: 768px) {
    .container {
        padding: 32px 16px;
    }
    .header-box {
        padding: 32px 20px;
        border-radius: 20px;
    }
    .header-box h1 {
        font-size: 28px;
    }
    .header-box p {
        font-size: 14px;
    }
    #searchInput {
        padding: 14px 22px;
        font-size: 16px;
    }
    .scroll-row-inner {
        animation: none !important;
        flex-wrap: wrap;
        justify-content: center;
        gap: 24px;
    }
    .scroll-row {
        mask-image: none;
        -webkit-mask-image: none;
    }
    .logo-card {
        width: 102px;
        height: 102px;
    }
    .logo-card img {
        width: 60px;
        height: 60px;
    }
    .scroll-row {
        margin: 16px 0;
    }
    .preview-img {
        border-width: 2px;
    }
}
</style>
</head>
<body>
<!-- 左上角时间天气面板 -->
<div class="time-weather-panel" id="weatherPanel">
    <div class="time-text" id="timeBox">00:00</div>
    <div class="date-text" id="dateBox">2026年07月01日 星期三</div>
    <div class="weather-row">
        <span class="weather-icon" id="weatherIcon">🌤️</span>
        <span id="weatherText">加载天气...</span>
    </div>
    <!-- 内置音乐播放器 -->
    <div class="music-box">
        <div class="music-top">
            <button class="play-btn" id="playBtn">▶</button>
            <div class="play-progress" id="progressWrap">
                <div class="progress-inner" id="progressBar"></div>
            </div>
            <input type="range" class="volume-slider" id="volumeCtrl" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="music-time">
            <span id="currentTime">00:00</span>
            <span id="totalTime">00:00</span>
        </div>
    </div>
    <!-- 音频：GitHub CDN直链 出现又离开.mp3 -->
    <audio id="audioPlayer" loop volume="0.5">
        <source src="https://cdn.jsdelivr.net/gh/DXE123-xzs/logo@main/出现又离开.mp3" type="audio/mpeg">
    </div>

<div class="container">
    <div class="header-box">
        <h1>企业标志素材库</h1>
        <p>海量企业LOGO矢量图标素材 · 一键预览下载</p>
    </div>

    <div class="search-wrap">
        <input id="searchInput" placeholder="输入品牌/标志名称快速检索素材..." type="text">
    </div>

    <div id="scrollBox"></div>
</div>

<div class="preview-mask" id="mask">
    <img class="preview-img" id="bigImg">
</div>

<script>
const OWNER = "DXE123-xzs";
const REPO = "logo";
const BRANCH = "main";

const mask = document.getElementById("mask");
const bigImg = document.getElementById("bigImg");
const scrollBox = document.getElementById("scrollBox");
const searchInput = document.getElementById("searchInput");
const weatherPanel = document.getElementById("weatherPanel");

// 时间天气DOM
const timeBox = document.getElementById("timeBox");
const dateBox = document.getElementById("dateBox");
const weatherIcon = document.getElementById("weatherIcon");
const weatherText = document.getElementById("weatherText");

// 音乐DOM
const audioPlayer = document.getElementById("audioPlayer");
const playBtn = document.getElementById("playBtn");
const progressWrap = document.getElementById("progressWrap");
const progressBar = document.getElementById("progressBar");
const volumeCtrl = document.getElementById("volumeCtrl");
const currentTimeEl = document.getElementById("currentTime");
const totalTimeEl = document.getElementById("totalTime");

mask.onclick = () => mask.style.display = "none";

// 滚动监听：向下滚动隐藏面板，回到顶部显示
let lastScrollY = 0;
window.addEventListener('scroll', () => {
    const currentY = window.scrollY;
    // 滚动超过80px 隐藏
    if (currentY > 80) {
        weatherPanel.classList.add('hide-panel');
    } else {
        weatherPanel.classList.remove('hide-panel');
    }
    lastScrollY = currentY;
})

// 时间日期每秒自动更新
function updateDateTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    const hours = String(now.getHours()).padStart(2, "0");
    const mins = String(now.getMinutes()).padStart(2, "0");
    const weekArr = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
    const week = weekArr[now.getDay()];
    
    timeBox.textContent = `${hours}:${mins}`;
    dateBox.textContent = `${year}年${month}月${day} ${week}`;
}
updateDateTime();
setInterval(updateDateTime, 1000);

// 内置天气图标映射
const weatherEmojiMap = {
    "晴":"☀️", "多云":"⛅", "阴":"☁️", "小雨":"🌧️", "中雨":"🌧️", "大雨":"🌧️",
    "雷阵雨":"⛈️", "小雪":"❄️", "大雪":"❄️", "雾":"🌫️", "霾":"🌫️"
};

// 兜底静态天气（接口失效时永久显示这个，不再报网络异常）
function setDefaultWeather() {
    weatherIcon.textContent = "⛅";
    weatherText.textContent = "济南 多云";
}

// 加载天气，失败自动切换静态兜底
async function getWeather() {
    // 先加载默认兜底，防止空白
    setDefaultWeather();
    try {
        // 使用可跨域公开天气接口
        const res = await fetch("https://www.weatherapi.com/api-explorer.aspx/v1/current.json?key=demo&q=jinan&aqi=no");
        if (!res.ok) throw new Error("接口失败");
        const data = await res.json();
        const wText = data.current.condition.text;
        const temp = data.current.temp_c;
        let icon = weatherEmojiMap[wText] || "⛅";
        weatherIcon.textContent = icon;
        weatherText.textContent = `${wText} ${temp}℃`;
    } catch(err) {
        // 接口请求失败，保留上面设置好的默认天气，不报错文字
        console.log("天气接口无法访问，使用本地静态天气");
    }
}

// 页面加载立刻执行
getWeather();
// 每小时刷新一次天气
setInterval(getWeather, 3600000);

// ====== 音乐播放器逻辑 ======
// 格式化时间 秒 -> mm:ss
function formatSec(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, "0");
    const s = Math.floor(sec % 60).toString().padStart(2, "0");
    return m + ":" + s;
}

// 播放暂停切换
playBtn.addEventListener("click", () => {
    if(audioPlayer.paused) {
        audioPlayer.play();
        playBtn.textContent = "⏸";
    } else {
        audioPlayer.pause();
        playBtn.textContent = "▶";
    }
});

// 音量调节
volumeCtrl.addEventListener("input", () => {
    audioPlayer.volume = volumeCtrl.value;
});

// 音频加载完成获取总时长
audioPlayer.addEventListener("loadedmetadata", () => {
    totalTimeEl.textContent = formatSec(audioPlayer.duration);
});

// 实时更新进度条
audioPlayer.addEventListener("timeupdate", () => {
    const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
    progressBar.style.width = percent + "%";
    currentTimeEl.textContent = formatSec(audioPlayer.currentTime);
});

// 点击进度条跳转播放位置
progressWrap.addEventListener("click", (e) => {
    const rect = progressWrap.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const ratio = clickX / rect.width;
    audioPlayer.currentTime = audioPlayer.duration * ratio;
});

// 背景轮播
const bgList = [
    "https://picsum.photos/id/1036/1920/1080",
    "https://picsum.photos/id/1018/1920/1080",
    "https://picsum.photos/id/1043/1920/1080",
    "https://picsum.photos/id/1015/1920/1080",
    "https://picsum.photos/id/1039/1920/1080",
    "https://picsum.photos/id/1041/1920/1080",
    "https://picsum.photos/id/1044/1920/1080",
    "https://picsum.photos/id/1046/1080"
];
let bgIndex = 0;
const preloadImgs = [];
bgList.forEach(url => {
    const img = new Image();
    img.src = url;
    preloadImgs.push(img);
});
setInterval(() => {
    bgIndex = (bgIndex + 1) % bgList.length;
    document.body.style.background = `url(${bgList[bgIndex]}) center/cover no-repeat fixed`;
}, 30000);

let allImageList = [];

async function downloadImage(url, fileName) {
    try {
        const res = await fetch(url);
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(blobUrl);
    } catch (e) {
        window.open(url, "_blank");
    }
}

async function refreshLogoList() {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/images?ref=${BRANCH}`);
    const fileList = await res.json();
    scrollBox.innerHTML = "";
    if (!Array.isArray(fileList)) return;
    allImageList = fileList.filter(file => /\.(png|jpg|jpeg|svg|ico)$/i.test(file.name));
    renderFilterList("");
}

function renderFilterList(keyword) {
    scrollBox.innerHTML = "";
    const isSearch = keyword.trim() !== "";
    const filterList = allImageList.filter(item => item.name.toLowerCase().includes(keyword.toLowerCase()));

    if (filterList.length === 0) {
        scrollBox.innerHTML = `<div class="empty-tip">未匹配到相关标志素材，请更换关键词搜索</div>`;
        return;
    }

    const rowSize = 8;
    const totalRow = Math.ceil(filterList.length / rowSize);
    for (let r = 0; r < totalRow; r++) {
        const rowData = filterList.slice(r * rowSize, (r + 1) * rowSize);
        const listDouble = [...rowData, ...rowData];
        const rowClass = r % 2 === 0 ? "scroll-row row-left" : "scroll-row row-right";

        const rowWrap = document.createElement("div");
        rowWrap.className = rowClass;
        rowWrap.style.setProperty("--drag", "0px");
        const inner = document.createElement("div");
        inner.className = "scroll-row-inner";

        if (isSearch) {
            inner.style.animation = "none";
        }

        listDouble.forEach(file => {
            const imgSrc = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/images/${file.name}`;
            const card = document.createElement("div");
            card.className = "logo-card";
            card.innerHTML = `
                <img src="${imgSrc}" crossorigin="anonymous">
                <div class="logo-name" title="${file.name}">${file.name}</div>
                <div class="download-btn">下载原图</div>
            `;

            let dragMoved = false;
            let startX = 0;
            let startY = 0;
            const dragThreshold = 5;

            card.addEventListener("mousedown", (e) => {
                dragMoved = false;
                startX = e.clientX;
                startY = e.clientY;
            });
            card.addEventListener("mousemove", (e) => {
                const dx = Math.abs(e.clientX - startX);
                const dy = Math.abs(e.clientY - startY);
                if (dx > dragThreshold || dy > dragThreshold) dragMoved = true;
            });
            card.addEventListener("mouseup", () => {
                if (!dragMoved) {
                    bigImg.src = imgSrc;
                    mask.style.display = "flex";
                }
            });
            card.querySelector(".download-btn").onclick = function (e) {
                e.stopPropagation();
                downloadImage(imgSrc, file.name);
            }
            inner.appendChild(card);
        })
        rowWrap.appendChild(inner);
        scrollBox.appendChild(rowWrap);

        let isDrag = false;
        let dragStartX = 0;
        let dragOffset = 0;
        rowWrap.addEventListener("mousedown", (e) => {
            isDrag = true;
            dragStartX = e.clientX;
            rowWrap.classList.add("paused");
        });
        document.addEventListener("mousemove", (e) => {
            if (!isDrag) return;
            const diff = e.clientX - dragStartX;
            dragOffset += diff;
            dragStartX = e.clientX;
            rowWrap.style.setProperty("--drag", dragOffset + "px");
        });
        document.addEventListener("mouseup", () => {
            isDrag = false;
            rowWrap.classList.remove("paused");
        });
    }
}

searchInput.addEventListener("input", (e) => {
    renderFilterList(e.target.value);
});

refreshLogoList();
</script>
</body>
</html>
